name: Updatecli

on:
  workflow_dispatch:
  schedule:
    # Run every day at 08:00 UTC
    - cron: "0 8 * * *"

jobs:
  updatecli:
    name: Bump golang version
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Updatecli
        uses: updatecli/updatecli-action@e71be7554f3f940bc439cf720b3e4e379823c562 # v3.2.0

      - name: Diff (dry-run on PR)
        if: github.ref != 'refs/heads/master'
        env:
          GITHUB_TOKEN: ${{ secrets.HARVESTER_TOKEN }}
        run: |
          updatecli compose diff --file updatecli/updatecli-compose.yaml

      - name: Apply
        if: github.ref == 'refs/heads/master'
        env:
          GITHUB_TOKEN: ${{ secrets.HARVESTER_TOKEN }}
        run: |
          updatecli compose apply --file updatecli/updatecli-compose.yaml
